# Publishes the next article for community/llm-safety-red-team/ every intervalDays (default 21).
# LinkedIn group posts cannot be automated via public API—copy the new URL from the hub after each run.

name: Community LLM Safety publish

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Publish next queued article now (ignore 21-day interval)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish next article (if due)
        env:
          FORCE_PUBLISH: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
        run: python3 scripts/community_llm_safety_publish.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add community/llm-safety-red-team/manifest.json community/llm-safety-red-team/topics-queue.json community/llm-safety-red-team/articles/
          if git diff --staged --quiet; then
            echo "No publish this run (interval not reached, empty queue, or already up to date)."
            exit 0
          fi
          git commit -m "Community: publish LLM Safety & Red-Teaming article [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
