        /* Hacker-style banner (same structure as llm-discovery/index.html) */
        .banner-header {

        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(91, 127, 184, 0.01) 2px, rgba(91, 127, 184, 0.01) 4px);
            animation: matrix-scroll 20s linear infinite;
            z-index: 2;
        }
        @keyframes matrix-scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        .glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(91, 127, 184, 0.03) 50%, transparent 100%);
            animation: glitch 0.3s infinite;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes glitch {
            0%, 100% { transform: translateX(0); opacity: 0; }
            50% { transform: translateX(2px); opacity: 0.1; }
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(91, 127, 184, 0.2);
            box-shadow: 0 0 4px rgba(91, 127, 184, 0.3);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes scan {
            0% { top: 0; opacity: 1; }
            50% { opacity: 0.5; }
            100% { top: 100%; opacity: 1; }
        }
        .pixelated-transition {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            z-index: 5;
            opacity: 0;
            display: none;
            pointer-events: none;
        }
        .pixelated-transition.active {
            display: block;
            opacity: 1;
            animation: pixelate-out 1.5s ease-in-out forwards;
        }
        @keyframes pixelate-out {
            0% { opacity: 1; filter: blur(0px) contrast(1); transform: scale(1); }
            25% { filter: blur(2px) contrast(2); transform: scale(1.02); }
            50% { filter: blur(4px) contrast(3); transform: scale(1.05); opacity: 0.8; }
            75% { filter: blur(8px) contrast(4); transform: scale(1.1); opacity: 0.4; }
            100% { filter: blur(20px) contrast(5); transform: scale(1.2); opacity: 0; }
        }
        .text-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .static-text {
            font-size: 48px;
            font-weight: bold;
            color: #5b7fb8;

            opacity: 1;
            transition: opacity 1s ease-out;
        }

        .typing-container {
            display: none;
            font-size: 64px;
            font-weight: bold;
            color: #5b7fb8;
            text-shadow: 0 0 8px rgba(91, 127, 184, 0.5), 0 0 16px rgba(91, 127, 184, 0.3), 0 0 24px rgba(91, 127, 184, 0.2);

        }
        @keyframes pixelate-in {
            0% { filter: blur(20px) contrast(5); opacity: 0; transform: scale(0.8); }
            50% { filter: blur(8px) contrast(3); opacity: 0.5; transform: scale(0.95); }
            100% { filter: blur(0px) contrast(1); opacity: 1; transform: scale(1); }

            50% { transform: scale(1.01); filter: brightness(1.05); }

    <script>
        (function () {
            var staticText = document.getElementById('staticText');
            var typingContainer = document.getElementById('typingContainer');
            var typingText = document.getElementById('typingText');
            var glitchWrapper = document.getElementById('glitchWrapper');
            var cursor = document.getElementById('cursor');
            var letters = ['E', 'L', 'A', 'M', 'C', 'B'];
            setTimeout(function () {
                staticText.classList.add('fade-out');
                var pixelatedTransition = document.getElementById('pixelatedTransition');
                pixelatedTransition.classList.add('active');
                setTimeout(function () {
                    staticText.style.display = 'none';
                    typingContainer.classList.add('active', 'pixelate-in');
                    var index = 0;
                    function typeLetter() {
                        if (index < letters.length) {
                            var letterSpan = document.createElement('span');
                            letterSpan.className = 'letter';
                            letterSpan.textContent = letters[index];
                            letterSpan.style.animationDelay = (index * 0.15) + 's';
                            typingText.appendChild(letterSpan);
                            glitchWrapper.setAttribute('data-text', letters.slice(0, index + 1).join(''));
                            index++;
                            setTimeout(typeLetter, 150);
                        } else {
                            glitchWrapper.setAttribute('data-text', 'ELAMCB...');
                            setTimeout(function () {
                                cursor.classList.add('visible');
                                typingContainer.classList.add('pulse');
                            }, 500);
                        }
                    }
                    typeLetter();
                }, 1000);
            }, 3000);
            var codeCharsContainer = document.getElementById('code-chars-container');
            var codeChars = ['0', '1', '{', '}', '[', ']', '(', ')', '<', '>', '/', '*', '+', '-', '=', '&', '|', '%', '#', '@'];
            var numCodeChars = 8;
            function createCodeChar() {
                var char = document.createElement('div');
                char.className = 'code-char';
                char.textContent = codeChars[Math.floor(Math.random() * codeChars.length)];
                char.style.left = Math.random() * window.innerWidth + 'px';
                char.style.animationDuration = (15 + Math.random() * 10) + 's';
                char.style.animationDelay = Math.random() * 5 + 's';
                codeCharsContainer.appendChild(char);
                setTimeout(function () {
                    if (char.parentNode) char.parentNode.removeChild(char);
                }, 25000);
            }
            for (var j = 0; j < numCodeChars; j++) {
                setTimeout(createCodeChar, j * 500);
            }
            setInterval(createCodeChar, 3000);
        })();
    </script>
    <script>
        (function () {
            var list = document.getElementById('article-list');
            var menu = document.getElementById('article-menu');
            var menuList = document.getElementById('article-menu-list');
            var menuFilter = document.getElementById('article-menu-filter');
            var titleEl = document.getElementById('series-title');
            var descEl = document.getElementById('series-desc');

            function slugify(s) {
                var t = String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return t || 'article';
            }

            function uniqueSlug(base, used) {
                var id = base;
                var n = 0;
                while (used[id]) {
                    n += 1;
                    id = base + '-' + n;
                }
                used[id] = true;
                return id;
            }

            menuFilter.addEventListener('input', function () {
                var q = menuFilter.value.trim().toLowerCase();
                var items = menuList.querySelectorAll('li[data-title]');
                for (var i = 0; i < items.length; i++) {
                    var t = items[i].getAttribute('data-title') || '';
                    items[i].style.display = !q || t.indexOf(q) !== -1 ? '' : 'none';
                }
            });

            fetch('manifest.json').then(function (r) {
                if (!r.ok) throw new Error('manifest');
                return r.json();
            }).then(function (m) {
                if (m.seriesTitle) titleEl.textContent = m.seriesTitle;
                descEl.textContent = m.seriesDescription || '';
                list.classList.remove('loading');
                list.innerHTML = '';
                menuList.innerHTML = '';
                var articles = (m.articles || []).slice().sort(function (a, b) {
                    return (b.date || '').localeCompare(a.date || '');
                });
                if (articles.length === 0) {
                    list.innerHTML = '<li>No articles yet.</li>';
                    return;
                }
                menu.removeAttribute('hidden');
                var usedSlugs = {};
                articles.forEach(function (a) {
                    var li = document.createElement('li');
                    var base = slugify(a.title) + (a.date ? '-' + slugify(a.date) : '');
                    var aid = 'article-' + uniqueSlug(base, usedSlugs);
                    li.id = aid;
                    var href = a.href || '#';
                    var url = href.indexOf('http') === 0 ? href
                        : (href.charAt(0) === '/' ? 'https://elamcb.github.io' + href
                        : 'https://elamcb.github.io/community/llm-safety-red-team/' + href);
                    var titleText = a.title || 'Untitled';

                    var dateP = document.createElement('p');
                    dateP.className = 'date';
                    dateP.innerHTML = '<i class="far fa-calendar"></i> ' + (a.date || '');
                    li.appendChild(dateP);

                    var h2 = document.createElement('h2');
                    var extLink = document.createElement('a');
                    extLink.href = url;
                    extLink.textContent = titleText;
                    h2.appendChild(extLink);
                    li.appendChild(h2);

                    if (a.summary) {
                        var sumP = document.createElement('p');
                        sumP.className = 'sum';
                        sumP.textContent = a.summary;
                        li.appendChild(sumP);
                    }
                    list.appendChild(li);

                    var mli = document.createElement('li');
                    mli.setAttribute('data-title', titleText.toLowerCase());
                    var ma = document.createElement('a');
                    ma.href = '#' + aid;
                    ma.appendChild(document.createTextNode(titleText));
                    if (a.date) {
                        var sd = document.createElement('span');
                        sd.className = 'menu-date';
                        sd.textContent = a.date;
                        ma.appendChild(sd);
                    }
                    mli.appendChild(ma);
                    menuList.appendChild(mli);
                });
            }).catch(function () {
                list.classList.remove('loading');
                list.innerHTML = '<li class="err">Could not load manifest.json. Open this site from GitHub Pages (not raw file).</li>';
            });
        })();
    </script>
</body>
</html>
