<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Safety &amp; Red-Teaming for QA Leaders | Community Series</title>
    <meta name="description" content="Dedicated article series for LLM safety and red-teaming for QA leaders. New pieces publish on a regular cadence.">
    <link rel="icon" type="image/svg+xml" href="../../images/favicon.svg">
    <link rel="canonical" href="https://elamcb.github.io/community/llm-safety-red-team/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script data-goatcounter="https://elamcb.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <style>
        :root {
            --secondary: #00d4ff;
            --accent: #7c3aed;
            --neon-blue: #00f5ff;
            --neon-purple: #bf00ff;
            --neon-green: #39ff14;
            --light: #e4e4e7;
            --card-bg: rgba(15, 15, 23, 0.92);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #533483 100%);
            background-attachment: fixed;
            color: var(--light);
            line-height: 1.7;
            min-height: 100vh;
        }
        .container { width: 90%; max-width: 1100px; margin: 0 auto; padding-left: 1rem; padding-right: 1rem; }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--secondary);
            color: #0a0a0f;
            padding: 0.8rem 1.2rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }
        .research-nav-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(124, 58, 237, 0.35);
            border: 2px solid var(--accent);
            color: var(--light);
            padding: 0.8rem 1.2rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .research-nav-btn:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }
        .site-header {
            clear: both;
            background: rgba(15, 15, 23, 0.9);
            backdrop-filter: blur(10px);
            text-align: center;
            padding: 2rem 0;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
            margin-bottom: 2rem;
        }
        .site-header h1 {
            font-size: 2.5rem;
            color: var(--light);
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            margin-bottom: 0.5rem;
        }
        .site-header .subtitle {
            font-size: 1.2rem;
            color: var(--accent);
        }
        main.container { padding-top: 1rem; padding-bottom: 4rem; }
        .lede { font-size: 1.1rem; opacity: 0.95; margin-bottom: 2rem; line-height: 1.75; }
        #article-list { list-style: none; }
        #article-list li {
            background: var(--card-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }
        #article-list h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        #article-list h2 a { color: var(--secondary); text-decoration: none; }
        #article-list h2 a:hover { text-decoration: underline; }
        #article-list .date { font-size: 0.85rem; color: var(--neon-green); margin-bottom: 0.5rem; }
        #article-list .sum { opacity: 0.9; font-size: 0.95rem; }
        .loading { opacity: 0.7; }
        .err { color: #ff6b6b; }
        @media (max-width: 768px) {
            .back-btn, .research-nav-btn {
                padding: 0.55rem 0.85rem;
                font-size: 0.85rem;
            }
            .back-btn {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 1rem;
                display: inline-block;
            }
            .research-nav-btn {
                position: relative;
                top: 0;
                right: 0;
                margin: 0 0 1rem auto;
                float: right;
                clear: right;
            }
            .research-nav-btn span { display: none; }
            .site-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    <a href="../../research/" class="research-nav-btn"><i class="fas fa-flask"></i> <span>AI Research</span></a>

    <header class="site-header">
        <div class="container header-inner">
            <h1 id="series-title">LLM Safety &amp; Red-Teaming for QA Leaders</h1>
            <p class="subtitle">Dedicated series · same spirit as AI Research, focused on safety &amp; red-teaming</p>
        </div>
    </header>

    <main class="container">
        <p class="lede" id="series-desc">Loading…</p>
        <h2 style="color: var(--secondary); font-size: 1.3rem; margin-bottom: 1rem;"><i class="fas fa-newspaper"></i> Articles</h2>
        <ul id="article-list" class="loading"><li>Loading article list…</li></ul>
        <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.8;">
            <a href="../../docs/LLM_RED_TEAM_PRODUCTION_GATE_QA.html" style="color: var(--secondary);">40-Prompt Production Gate</a> ·
            <a href="../../research/" style="color: var(--secondary);">Full AI research index</a>
        </p>
    </main>
    <script>
        (function() {
            var list = document.getElementById('article-list');
            var titleEl = document.getElementById('series-title');
            var descEl = document.getElementById('series-desc');
            fetch('manifest.json').then(function(r) {
                if (!r.ok) throw new Error('manifest');
                return r.json();
            }).then(function(m) {
                if (m.seriesTitle) titleEl.textContent = m.seriesTitle;
                descEl.textContent = m.seriesDescription || '';
                list.classList.remove('loading');
                list.innerHTML = '';
                var articles = (m.articles || []).slice().sort(function(a, b) {
                    return (b.date || '').localeCompare(a.date || '');
                });
                if (articles.length === 0) {
                    list.innerHTML = '<li>No articles yet.</li>';
                    return;
                }
                articles.forEach(function(a) {
                    var li = document.createElement('li');
                    var href = a.href || '#';
                    var url = href.indexOf('http') === 0 ? href
                        : (href.charAt(0) === '/' ? 'https://elamcb.github.io' + href
                        : 'https://elamcb.github.io/community/llm-safety-red-team/' + href);
                    li.innerHTML =
                        '<p class="date"><i class="far fa-calendar"></i> ' + (a.date || '') + '</p>' +
                        '<h2><a href="' + url + '">' + (a.title || 'Untitled') + '</a></h2>' +
                        (a.summary ? '<p class="sum">' + a.summary + '</p>' : '');
                    list.appendChild(li);
                });
            }).catch(function() {
                list.classList.remove('loading');
                list.innerHTML = '<li class="err">Could not load manifest.json. Open this site from GitHub Pages (not raw file).</li>';
            });
        })();
    </script>
</body>
</html>
